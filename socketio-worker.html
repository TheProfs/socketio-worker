<script src="socketio-worker.js"></script>

<dom-module id="socketio-worker">
  <template>
    <style>
      @keyframes pulse { 50% { opacity: 0.4; } }

      :host {
        display: block;
        color-scheme: light dark;
        color: light-dark(#111, #e6e6e6);
        font: 14px/1.5 system-ui, sans-serif;
        padding: 1.5rem;
      }

      button {
        font: inherit;
        padding: 0.5rem 1rem;
        margin-bottom: 1rem;
      }

      button.toggle { color: light-dark(#ff9800, #ffb74d); }
      button.toggle[connected] { color: light-dark(#4caf50, #81c784); }
      button.toggle[loading] { animation: pulse 1.2s ease-in-out infinite; }

      pre {
        background: light-dark(#f5f5f5, #1a1a1a);
        color: light-dark(#222, #ddd);
        border-radius: 4px;
        margin: 0 0 0.5rem;
        padding: 0.75rem;
        white-space: pre-wrap;
      }

      pre.error {
        background: light-dark(#fff3e0, #3a2410);
        color: light-dark(#c62828, #ff8a80);
      }

      .tick {
        font-family: ui-monospace, monospace;
        color: light-dark(#888, #888);
        font-size: 12px;
        margin: 0.25rem 0 1rem;
      }
    </style>

    <button
      class="toggle"
      type="button"
      on-tap="toggle"
      connected$="[[connected]]"
      loading$="[[loading]]">
      [[_label(connected)]]
    </button>

    <div class="tick">main thread tick: [[tick]]</div>

    <pre aria-live="polite">[[lastMessage]]</pre>
    <pre
      class="error"
      aria-live="assertive"
      hidden$="[[!lastError]]">[[lastError]]</pre>
  </template>

  <script>
    'use strict'

    Polymer({
      is: 'socketio-worker',

      properties: {
        auto: { type: Boolean, value: false },
        url: { type: String, value: () => location.origin },
        src: { type: String, value: '/socketio-worker.js' },
        lib: { type: String, value: '' },
        auth: { type: String, value: '' },
        query: { type: String, value: '' },
        socket: { type: Object },
        connected: { type: Boolean, value: false, notify: true },
        reconnecting: { type: Boolean, value: false, notify: true },
        loading: { type: Boolean, value: false },
        tick: { type: String, value: '' },
        lastMessage: { type: String, value: '' },
        lastError: { type: String, value: '' }
      },

      attached() {
        this._detached = false
        this._init()
        this._tickTimer = setInterval(() =>
          this.set('tick', new Date().toISOString().slice(11, 23)),
        100)
        if (this.auto)
          this.connect()
      },

      detached() {
        this._detached = true
        clearInterval(this._tickTimer)
        this._removeListeners()
        const socket = this.socket
        this.set('socket', null)
        socket?.close()
      },

      toggle() {
        return this.connected ? this.disconnect() : this.connect()
      },

      async connect() {
        this._init()
        this.set('loading', true)

        try {
          const values = {}
          if (this.auth)
            values.auth = JSON.parse(this.auth)

          if (this.query)
            values.query = JSON.parse(this.query)

          await this.socket.ready
          if (Object.keys(values).length)
            await this.socket.set(values)

          const snapshot = await this.socket.connect(this.url)
          if (this._detached)
            return this

          this.set('connected', Boolean(snapshot.connected))
          this.set('reconnecting', Boolean(snapshot.reconnecting))
          this._log('connect', snapshot)
          return this.socket
        } catch (error) {
          if (this._detached)
            return this
          this._log('error', { message: error?.message || String(error) })
          throw error
        } finally {
          if (!this._detached)
            this.set('loading', false)
        }
      },

      async disconnect() {
        if (!this.socket)
          return this

        this.set('loading', true)

        try {
          const snapshot = await this.socket.disconnect()
          if (this._detached)
            return this

          this.set('connected', Boolean(snapshot.connected))
          this.set('reconnecting', Boolean(snapshot.reconnecting))
          this._log('disconnect', snapshot)
        } catch (error) {
          if (this._detached)
            return this

          this._log('error', { message: error?.message || String(error) })
          throw error
        } finally {
          if (!this._detached)
            this.set('loading', false)
        }

        return this
      },

      _label: connected => connected ? 'Connected' : 'Disconnected',

      _init() {
        if (this.socket)
          return

        const config = {
          src: this.src,
          options: {
            autoConnect: false,
            reconnection: true,
            reconnectionAttempts: 5,
            transports: ['websocket']
          }
        }

        if (this.lib)
          config.lib = this.lib

        this.set('socket', new SocketIOWorker(config))

        this._handlers = {
          connect: patch => {
            this.set('connected', true)
            this.set('reconnecting', Boolean(patch.reconnecting))
            this._log('connect', patch)
          },
          disconnect: (patch, message) => {
            this.set('connected', false)
            this.set('reconnecting', Boolean(patch.reconnecting))
            this._log('disconnect', { patch, value: message?.value })
          },
          connect_error: (_patch, message) =>
            this._log('connect_error', message?.value),
          'proxy:reconnect_attempt': patch => {
            this.set('reconnecting', Boolean(patch.reconnecting))
            this._log('proxy:reconnect_attempt', patch)
          },
          'proxy:worker_error': error => this._log('proxy:worker_error', {
            message: error?.message || String(error)
          })
        }

        for (const [name, handler] of Object.entries(this._handlers))
          this.socket.on(name, handler)

        this.socket.ready
          .then(snapshot => {
            if (!this._detached)
              this._log('ready', snapshot)
          })
          .catch(error => {
            if (!this._detached)
              this._log('error', { message: error?.message || String(error) })
          })
      },

      _removeListeners() {
        if (!this.socket || !this._handlers)
          return

        for (const [name, handler] of Object.entries(this._handlers))
          this.socket.off(name, handler)
      },

      _log(type, data) {
        const entry = { type, at: new Date().toISOString(), data }
        const text = JSON.stringify(entry, null, 2)

        this.set('lastMessage', text)

        if (type === 'error' || type.endsWith('_error'))
          this.set('lastError', text)
        else if (type === 'connect')
          this.set('lastError', '')
      }
    })
  </script>
</dom-module>
